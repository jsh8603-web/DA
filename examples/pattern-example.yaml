# DA-20260422-ctx-warn-long-mode

## Signal-to-Action

opus 세션 장기 작업 시 ctx-warn 연발이 예상되면 `bash ~/.claude/scripts/ctx-warn-long-mode.sh on` 으로 cap 을 500k 로 확장한다. compact/resume 시 자동 복귀되므로 다음 세션은 기본 cap 으로 원복된다.

