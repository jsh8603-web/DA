# DA-20260422-model-routing-switch-cooldown

## Signal-to-Action

opus↔sonnet 전환은 A(≥20k 누적) AND B(sonnet<100k / opus<180k) 모두 충족 시만 허용한다. `model-switch-and-send.sh` 가 자가 강제. B limit 초과 시 (a)/compact (b)서브에이전트 (c)handshake 중 선택. `/model` 직접 입력 절대 금지.

