# DA-20260422-harness-wf-fail-escalation-flow

## Signal-to-Action

Worker 구현 → Verifier FAIL → Healer 수정 → 재검증 FAIL 순환에서 `retry-count == 3` 도달 시 Supervisor 중재 (step 6), Supervisor 중재 실패 시 SR T3 Creative Window 호출 (step 7), SR 대안 후에도 실패 시 Supervisor 직접 수정 (step 8), 최종 실패 시 `[DEADLOCK]` 인간 에스컬레이션 + `improvement-registry.md` 새 행 기록 (step 9). 이 순서를 건너뛰는 직접 수정·즉시 인간 호출은 명시적 예외 (타이포 / 사용자 긴급) 가 아닌 한 금지.

