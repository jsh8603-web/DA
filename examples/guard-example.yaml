# DA-20260422-code-quality-large-file-read

## Signal-to-Action

Read 전에 파일 크기를 확인하고, 500 줄 이상이면 `offset` / `limit` 분할 Read 를 사용한다. 에이전트 출력 파일도 동일 적용.

