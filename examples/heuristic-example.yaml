# DA-20260422-code-quality-simplify-trigger

## Signal-to-Action

기능 구현 완료 후 변경 파일 수가 5 개를 초과하면 `simplify` 를 실행한다. 3 서브에이전트가 재사용성·품질·효율성 관점에서 병렬 정리한다.

