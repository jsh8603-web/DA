# 자연어-DA Lexicon v0.1 (Phase 1 minimal)
# 사용처: md-to-da.ts 파서 힌트 + md 작성 가이드 + 미래 LLM inject
# 확장: 새 자연어 표현 발견 시 본 파일만 업데이트 (zero-code)

version: 1
last-updated: "2026-04-22"

# ============================================================
# § Bold-marker (md 에서 **Marker**: 로 쓰는 명시적 필드)
# md-to-da.ts 가 직접 인식. 대소문자 무관.
# ============================================================
markers:
  # 식별/분류
  - marker: Kind
    maps-to: kind
    type: scalar
    values: [guard, heuristic, constraint, pattern, scenario, chain]

  - marker: Priority
    maps-to: priority
    type: scalar
    values: [critical, high, medium, low]

  - marker: Modality
    maps-to: modality
    type: scalar
    values: [must, must-not, should, should-not, may, may-not]

  - marker: Severity
    maps-to: severity
    type: scalar
    values: [data-loss, context-loss, ux-failure, ux-degrade, audit-failure, none]

  # 조건문 (4대 필드)
  - marker: When
    maps-to: when
    type: paragraph
  - marker: If
    maps-to: if
    type: paragraph
  - marker: Then
    maps-to: then
    type: paragraph
  - marker: Because
    maps-to: because
    type: paragraph

  # Trigger 블록 (sub-parse — ### heading 또는 bullet sub-items)
  - marker: Trigger
    maps-to: trigger
    type: object
    sub-fields:
      - label: Keywords
        maps-to: trigger.keywords
        type: backtick-list   # `word1`, `word2` 형태
      - label: Tools
        maps-to: trigger.tool-names
        type: backtick-list
      - label: File globs
        maps-to: trigger.file-globs
        type: backtick-list
      - label: Context
        maps-to: trigger.context-hints
        type: comma-list

  # Examples (precision 개선 핵심)
  - marker: Examples
    maps-to: example-queries
    type: bullet-list-quoted

  # 예외/반례
  - marker: Counter-example
    maps-to: counter-example
    type: paragraph
  - marker: Anti-pattern
    maps-to: anti-pattern
    type: paragraph

  # chain kind 전용 필드 (sequence)
  - marker: Sequence
    maps-to: sequence
    type: bullet-list-structured
    sub-fields:
      - label: step
        type: integer
      - label: stage
        type: string
      - label: trigger
        type: string
      - label: condition
        type: string
      - label: action
        type: string
      - label: actor
        type: enum
        values: [Worker, Verifier, Healer, SR, Supervisor, System]
      - label: da-ref
        type: string
      - label: fields-written
        type: string-list
    include-in-embed: true

  # chain 전용 출입 조건
  - marker: Entry-conditions
    maps-to: entry-conditions
    type: paragraph
    include-in-embed: true
  - marker: Exit-conditions
    maps-to: exit-conditions
    type: paragraph
    include-in-embed: true

  # 수치 경계 (chain + 일반 DA 모두 허용)
  - marker: Numeric-bounds
    maps-to: numeric-bounds
    type: bullet-list-key-value-unit-desc
    include-in-embed: true

  # DERIVED FIELDS (auto-generated by md-to-da deriveChainMarkers, NOT agent-writable):
  # - input-role (from sequence[0].actor)
  # - output-role (from sequence[last].actor)
  # - output-condition (from sequence[last].condition)
  # - actors (unique set of sequence[*].actor)
  # 위 필드를 md 에 직접 작성하면 md-to-da 가 경고 + 무시한다.

  # 관계 필드 (단독 bold-marker 로 작성)
  - marker: Precondition
    maps-to: depends-on
    type: relation-list
  - marker: Co-applies
    maps-to: applies-with
    type: relation-list
  - marker: Parent-rule
    maps-to: meta-of
    type: relation-list
    reverse: true

  # Narrative + Signal-to-Action (embedding body)
  - marker: Signal-to-Action
    maps-to: signal-to-action
    type: paragraph
    include-in-embed: true
  - marker: Narrative
    maps-to: narrative
    type: paragraph
    include-in-embed: true

  # 메타
  - marker: Evidence
    maps-to: evidence
    type: paragraph
  - marker: Migration-note
    maps-to: migration-note
    type: paragraph

  # 복합 조건 (scenario 용, Phase 1 미사용이지만 파서가 이미 이해)
  - marker: Branches
    maps-to: steps[].branches
    type: branch-list
  - marker: Steps
    maps-to: steps
    type: numbered-role-list

# ============================================================
# § 자연어 패턴 → DA 필드 매핑 (inline NLP, 2.6.2 표)
# Phase 1 은 Bold-marker 만으로 충분하므로 이 섹션은 Phase 2+ 활용.
# ============================================================
patterns:
  # 향후 md 가 bold-marker 없이 자연어만으로 작성됐을 때 사용
  # 현재 Phase 1 은 미활용이지만 선언해두어 파서 확장 여지 확보

  - category: condition-when
    natural-language: ["{X}할 때", "{X}에서", "{X}인 경우", "{X} 시점에"]
    maps-to: { field: when }
  - category: condition-if
    natural-language: ["만약 {X}라면", "{X}이면", "{X}이 있으면"]
    maps-to: { field: if }
  - category: action-must
    natural-language: ["반드시 {X}", "{X}해야 한다", "{X}할 것", "필수로 {X}"]
    maps-to: { field: then, modality: must }
  - category: action-must-not
    natural-language: ["{X}을 금지한다", "{X}하지 말 것", "⛔ {X}", "절대 {X}하지 마라"]
    maps-to: { field: then, modality: must-not, negate: true }
  - category: action-should
    natural-language: ["{X}을 권장한다", "{X}이 좋다", "기본값: {X}"]
    maps-to: { field: then, modality: should }
  - category: reason
    natural-language: ["왜냐하면 {X}", "{X} 때문이다", "{X} 근거"]
    maps-to: { field: because }
  - category: exception
    natural-language: ["단, {X}", "예외: {X}", "{X}는 제외"]
    maps-to: { field: counter-example }
  - category: antipattern
    natural-language: ["흔한 실수: {X}", "{X}하면 안 됨", "잘못된 예: {X}"]
    maps-to: { field: anti-pattern }

