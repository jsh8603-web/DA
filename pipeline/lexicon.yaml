# ============================================================
# § 역방향 렌더링 템플릿 (DA → 자연어 variant, embedding enrichment)
# rebuild.ts 가 이 템플릿으로 1 DA → N variant 생성.
# ============================================================
render-templates:
  modality-must: "반드시 {then}"
  modality-must-not: "⛔ {then} 금지"
  modality-should: "{then} 권장"
  when-prefix: "{when} 상황에서"
  because-prefix: "왜냐하면 {because}"

# ============================================================
# § md-to-da.ts 동작 옵션
# ============================================================
options:
  # md 섹션 헤더 정규식 (DA slug = 이 패턴과 일치한 ## 헤더)
  section-header-regex: "^## ([a-z][a-z0-9-]*)$"

  # DA id 생성 규칙: DA-{date}-{slug}
  # date = md 파일의 첫 DA YAML 에서 추출, 없으면 "20260422" (기본)
  da-id-prefix: "DA-20260422-"

  # 기존 decisions/*.yaml 의 관계 필드 보존 (depends-on, applies-with, meta-of, sources)
  preserve-existing-relations: true

  # version bump: md 재작성 후 자동 v3 승격
  new-version: 3

  # embedding 에 포함할 필드 (rebuild.ts 가 활용)
  embed-fields:
    - id
    - kind
    - priority
    - trigger.keywords
    - trigger.context-hints
    - when
    - if
    - then
    - because
    - example-queries
    - signal-to-action
